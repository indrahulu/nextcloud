name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
    paths-ignore:
      - README.md
  pull_request:
    branches: [master]
    paths-ignore:
      - README.md
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

env:
  REGISTRY: indrahulu/nextcloud

jobs:
  build-test-push:
    strategy:
      fail-fast: true
      matrix:
        nextcloud_version:
          - "31.0-apache"
          - "32.0-apache"
          - "33.0-apache"
          - "34.0-apache"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: >
          docker build
          --build-arg NEXTCLOUD_VERSION=${{ matrix.nextcloud_version }}
          -t ${{ env.REGISTRY }}:${{ matrix.nextcloud_version }}
          .

      - name: Smoke test
        run: bash tests/smoke-test.sh ${{ matrix.nextcloud_version }}

      - name: Login to Docker Hub
        if: >
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'schedule' ||
          startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image
        if: >
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'schedule' ||
          startsWith(github.ref, 'refs/tags/v')
        run: |
          REGISTRY="${{ env.REGISTRY }}"
          NC_VER="${{ matrix.nextcloud_version }}"
          IMAGE="${REGISTRY}:${NC_VER}"

          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            echo "Pushing nightly tag"
            docker tag "${IMAGE}" "${REGISTRY}:${NC_VER}-nightly"
            docker push "${REGISTRY}:${NC_VER}-nightly"

          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            echo "Pushing versioned tag: ${NC_VER}-v${VERSION}"
            docker tag "${IMAGE}" "${REGISTRY}:${NC_VER}-v${VERSION}"
            docker push "${REGISTRY}:${NC_VER}-v${VERSION}"
            echo "Pushing latest tag: ${NC_VER}"
            docker push "${IMAGE}"

          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "Pushing latest tag"
            docker push "${IMAGE}"

          else
            echo "No push condition matched"
            exit 1
          fi

  cleanup:
    needs: build-test-push
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cleanup old versioned tags
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: bash scripts/cleanup-old-tags.sh
